<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Generator — IEEE E&TC</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Poppins', sans-serif;
    background: #0f0f1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 16px 60px;
    color: #eee;
  }
  h1 { font-size: 1.3rem; color: #f0d080; margin-bottom: 4px; letter-spacing: 1px; text-align: center; font-weight: 600; }
  .subtitle { font-size: 0.8rem; color: #888; margin-bottom: 30px; text-align: center; }
  .section-label { font-size: 0.7rem; color: #f0d080aa; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; margin-top: 22px; width: 100%; max-width: 680px; }
  .students-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 10px; width: 100%; max-width: 680px; }
  .tile { background: #16213e; border: 1px solid #2a2a50; border-radius: 10px; padding: 14px 16px; cursor: pointer; transition: border-color 0.2s, transform 0.15s; }
  .tile:hover { border-color: #f0d080; transform: translateY(-2px); }
  .tile .tname { font-size: 0.92rem; color: #eee; margin-bottom: 5px; }
  .badge { display: inline-block; font-size: 0.68rem; padding: 2px 9px; border-radius: 20px; font-weight: 600; }
  .b1 { background: #c9a020; color: #000; }
  .b2 { background: #666; color: #fff; }
  .bp { background: #1e4d2e; color: #7effa0; }
  #cert-view { display: none; width: 100%; max-width: 720px; }
  #list-view { width: 100%; max-width: 680px; }
  .back-btn { background: none; border: none; color: #f0d080; font-size: 0.88rem; cursor: pointer; margin-bottom: 18px; display: flex; align-items: center; gap: 6px; font-family: 'Poppins', sans-serif; }
  .cert-card { background: #16213e; border: 1px solid #2a2a50; border-radius: 14px; padding: 20px; }
  .cv-name { font-size: 1.1rem; color: #f0d080; font-weight: 600; margin-bottom: 4px; }
  canvas { width: 100%; border-radius: 8px; display: block; margin: 14px 0; }
  .btn-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
  .btn { font-family: 'Poppins', sans-serif; font-size: 0.85rem; font-weight: 600; padding: 9px 20px; border-radius: 8px; cursor: pointer; border: none; text-decoration: none; display: inline-block; }
  .btn-gold { background: #f0d080; color: #0f0f1a; }
  .btn-gold:hover { background: #ffe090; }
  .btn-ghost { background: transparent; border: 1px solid #f0d08088; color: #f0d080; }
  .btn-ghost:hover { background: #f0d08015; }
  .link-box { background: #0a0a16; border: 1px solid #2a2a50; border-radius: 8px; padding: 10px 14px; font-size: 0.72rem; color: #7ec8ff; word-break: break-all; cursor: pointer; }
  .link-hint { font-size: 0.68rem; color: #666; margin-top: 5px; }
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(10px); background: #f0d080; color: #0f0f1a; padding: 9px 22px; border-radius: 30px; font-weight: 700; font-size: 0.85rem; opacity: 0; transition: opacity 0.25s, transform 0.25s; pointer-events: none; z-index: 999; font-family: 'Poppins', sans-serif; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<h1>🎓 Certificate Generator</h1>
<p class="subtitle">IEEE E&TC — Technical Presentation</p>

<div id="list-view">
  <div class="section-label">🥇 First Rank</div>
  <div class="students-grid" id="grid-1"></div>
  <div class="section-label">🥈 Second Rank</div>
  <div class="students-grid" id="grid-2"></div>
  <div class="section-label">🎖 Participants</div>
  <div class="students-grid" id="grid-p"></div>
</div>

<div id="cert-view">
  <button class="back-btn" onclick="showList()">← Back to all students</button>
  <div class="cert-card">
    <div class="cv-name" id="cv-name"></div>
    <div id="cv-badge"></div>
    <canvas id="cert-canvas"></canvas>
    <div class="btn-row">
      <a class="btn btn-gold" id="dl-btn" download="certificate.png">⬇ Download</a>
      <button class="btn btn-ghost" onclick="copyLink()">🔗 Copy Link</button>
    </div>
    <div class="link-box" id="link-display" onclick="copyLink()"></div>
    <div class="link-hint">Tap to copy shareable link</div>
  </div>
</div>

<div class="toast" id="toast">✓ Link copied!</div>

<script>
const STUDENTS = [
  { name: "Anjali Choubey",    rank: 1 },
  { name: "Arohi Kulkarni",    rank: 1 },
  { name: "Rushikesh Marathe", rank: 2 },
  { name: "Sharvil Kapadne",   rank: 2 },
  { name: "Tanvi Dhomse",      rank: 0 },
  { name: "Khushi More",       rank: 0 },
  { name: "Kajal Gajre",       rank: 0 },
  { name: "Varsha Sonawane",   rank: 0 },
  { name: "Anuj Patel",        rank: 0 },
  { name: "Astitva Kamble",    rank: 0 },
  { name: "Manoj Wagh",        rank: 0 },
  { name: "Mohit Kapure",      rank: 0 },
];

const IMG = new Image();
IMG.crossOrigin = "anonymous";
IMG.src = "1000094831.png";

let currentStudent = null;

function buildList() {
  const g1 = document.getElementById('grid-1');
  const g2 = document.getElementById('grid-2');
  const gp = document.getElementById('grid-p');
  STUDENTS.forEach(s => {
    const tile = document.createElement('div');
    tile.className = 'tile';
    const bc = s.rank === 1 ? 'b1' : s.rank === 2 ? 'b2' : 'bp';
    const bt = s.rank === 1 ? '1st Rank' : s.rank === 2 ? '2nd Rank' : 'Participant';
    tile.innerHTML = `<div class="tname">${s.name}</div><span class="badge ${bc}">${bt}</span>`;
    tile.onclick = () => openCert(s);
    if (s.rank === 1) g1.appendChild(tile);
    else if (s.rank === 2) g2.appendChild(tile);
    else gp.appendChild(tile);
  });
}

function buildLink(s) {
  const base = window.location.href.split('?')[0];
  return `${base}?name=${encodeURIComponent(s.name)}&rank=${s.rank}`;
}

function openCert(student) {
  currentStudent = student;
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('cert-view').style.display = 'block';
  const bc = student.rank === 1 ? 'b1' : student.rank === 2 ? 'b2' : 'bp';
  const bt = student.rank === 1 ? '1st Rank' : student.rank === 2 ? '2nd Rank' : 'Participant';
  document.getElementById('cv-name').textContent = student.name;
  document.getElementById('cv-badge').innerHTML = `<span class="badge ${bc}" style="margin-top:4px;display:inline-block">${bt}</span>`;
  document.getElementById('link-display').textContent = buildLink(student);
  if (IMG.complete && IMG.naturalWidth > 0) drawCertificate(student);
  else IMG.onload = () => drawCertificate(student);
}

function drawCertificate(student) {
  const canvas = document.getElementById('cert-canvas');
  const ctx = canvas.getContext('2d');
  const W = IMG.naturalWidth;
  const H = IMG.naturalHeight;
  canvas.width = W;
  canvas.height = H;
  ctx.drawImage(IMG, 0, 0, W, H);

  // ── NAME on the blank underline ──
  // The line is at ~38.5% of height, horizontally centered
  ctx.save();
  ctx.font = `bold ${Math.round(W * 0.046)}px 'Dancing Script', cursive`;
  ctx.fillStyle = '#1a1a6e';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(student.name, W * 0.5, H * 0.383);
  ctx.restore();

  // ── STRIKETHROUGHS on rank line ──
  // The rank line "has successfully participated/ Won first rank /second rank"
  // sits at ~44% height on a 768px tall image
  // Segment x-positions calibrated for 1366px wide image:
  //   "participated/"  : 290 → 548
  //   "Won first rank" : 570 → 770
  //   "second rank"    : 795 → 1012
  const sx = W / 1366;
  const sy = H / 768;
  const lY = H * 0.441;
  const lW = Math.max(3, H * 0.012);

  ctx.save();
  ctx.strokeStyle = '#cc0000';
  ctx.lineWidth = lW;
  ctx.lineCap = 'round';

  function strike(x1, x2) {
    ctx.beginPath();
    ctx.moveTo(x1 * sx, lY);
    ctx.lineTo(x2 * sx, lY);
    ctx.stroke();
  }

  if (student.rank === 1) {
    // keep "Won first rank", strike others
    strike(290, 548);   // participated/
    strike(795, 1012);  // second rank
  } else if (student.rank === 2) {
    // keep "second rank", strike others
    strike(290, 548);   // participated/
    strike(570, 770);   // Won first rank
  } else {
    // keep "participated/", strike both ranks
    strike(570, 770);   // Won first rank
    strike(795, 1012);  // second rank
  }

  ctx.restore();

  // download
  const dl = document.getElementById('dl-btn');
  dl.href = canvas.toDataURL('image/png');
  dl.download = `Certificate_${student.name.replace(/ /g,'_')}.png`;
}

function copyLink() {
  if (!currentStudent) return;
  navigator.clipboard.writeText(buildLink(currentStudent)).then(() => {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  });
}

function showList() {
  document.getElementById('cert-view').style.display = 'none';
  document.getElementById('list-view').style.display = 'block';
}

// Auto-load from URL params (when student opens their personal link)
function loadFromURL() {
  const p = new URLSearchParams(window.location.search);
  const name = p.get('name');
  const rank = parseInt(p.get('rank') ?? '-1');
  if (name && rank >= 0) {
    const s = { name: decodeURIComponent(name), rank };
    document.getElementById('list-view').style.display = 'none';
    if (IMG.complete && IMG.naturalWidth > 0) openCert(s);
    else IMG.onload = () => openCert(s);
    return true;
  }
  return false;
}

buildList();
loadFromURL();
</script>
</body>
</html>
