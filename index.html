<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Generator</title>

<style>
body { font-family: Arial; background:#111; color:#fff; text-align:center; }
.tile { margin:10px; padding:10px; background:#222; cursor:pointer; }
canvas { width:100%; max-width:700px; margin-top:20px; }
</style>
</head>

<body>

<h2>Certificate Generator</h2>

<div id="list"></div>
<canvas id="canvas"></canvas>

<script>
const students = [
  { name: "Sharvil Kapadne", rank: 2 },
  { name: "Rushikesh Marathe", rank: 2 },
  { name: "Anjali Choubey", rank: 1 },
  { name: "Arohi Kulkarni", rank: 1 },
  { name: "Tanvi Dhomse", rank: 0 }
];

const img = new Image();
img.src = "1000094831.png";

const list = document.getElementById("list");

students.forEach(s => {
  const d = document.createElement("div");
  d.className = "tile";
  d.innerText = s.name;
  d.onclick = () => generate(s);
  list.appendChild(d);
});

function generate(student) {
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = img.width;
  canvas.height = img.height;

  ctx.drawImage(img, 0, 0);

  // NAME
  ctx.font = "bold 40px cursive";
  ctx.fillStyle = "blue";
  ctx.textAlign = "center";
  ctx.fillText(student.name, canvas.width/2, canvas.height*0.38);

  // STRIKE SETTINGS
  const scaleX = canvas.width / 1366;
  const y = canvas.height * 0.445;

  ctx.strokeStyle = "#222";
  ctx.lineWidth = 5;

  function strike(x1, x2) {
    ctx.beginPath();
    ctx.moveTo(x1 * scaleX, y);
    ctx.lineTo(x2 * scaleX, y);
    ctx.stroke();
  }

  // EXACT POSITIONS (fixed)
  const participated = [300, 540];
  const firstRank = [580, 760];
  const secondRank = [800, 1030];

  if (student.rank === 1) {
    // KEEP "Won first rank"
    strike(...participated);
    strike(...secondRank);
  }
  else if (student.rank === 2) {
    // KEEP "second rank"
    strike(...participated);
    strike(...firstRank);
  }
  else {
    // KEEP "participated"
    strike(...firstRank);
    strike(...secondRank);
  }
}
</script>

</body>
</html>
